name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact: tiffy-windows
          - os: macos-latest
            artifact: tiffy-macos
          - os: ubuntu-latest
            artifact: tiffy-linux

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -q
          sudo apt-get install -y \
            libxcb-xinerama0 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 \
            libxcb-randr0 libxcb-render-util0 libxcb-xkb1 libxkbcommon-x11-0 \
            libegl1 libgl1 libglib2.0-0

      - name: Install Python dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Build (Windows / Linux)
        if: runner.os != 'macOS'
        run: >
          pyinstaller
          --name tiffy
          --windowed
          --collect-all rasterio
          --hidden-import PyQt5.QtWebEngineWidgets
          --hidden-import PyQt5.QtWebEngineCore
          main.py

      - name: Build (macOS)
        if: runner.os == 'macOS'
        run: >
          pyinstaller
          --name tiffy
          --windowed
          --osx-bundle-identifier com.tiffy.app
          --collect-all rasterio
          --hidden-import PyQt5.QtWebEngineWidgets
          --hidden-import PyQt5.QtWebEngineCore
          main.py

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path dist/tiffy -DestinationPath ${{ matrix.artifact }}.zip

      - name: Package (macOS)
        if: runner.os == 'macOS'
        run: zip -r ${{ matrix.artifact }}.zip dist/tiffy.app

      - name: Package (Linux)
        if: runner.os == 'Linux'
        run: zip -r ${{ matrix.artifact }}.zip dist/tiffy

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.zip
          retention-days: 30

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact }}.zip
